<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plastic World</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #ffffff;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: 'Bitcount Prop Single', 'Space Mono', 'Courier New', monospace;
  user-select: none;
  cursor: default;
}

/* ── Header ── */
#header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 20;
  padding: 36px 48px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  pointer-events: none;
}

#site-title {
  font-size: 11px;
  letter-spacing: 0.45em;
  color: #000;
  font-weight: 400;
  text-transform: uppercase;
  line-height: 1;
}

#site-sub {
  font-size: 9px;
  letter-spacing: 0.25em;
  color: #aaa;
  text-transform: uppercase;
  margin-top: 8px;
}

#hint {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: #ccc;
  text-transform: uppercase;
  text-align: right;
  line-height: 1.8;
}

/* ── Scene ── */
#scene {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

#sphere {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 0;
  height: 0;
}

/* ── Image cards ── */
.img-card {
  position: absolute;
  width: 130px;
  height: 90px;
  cursor: pointer;
  overflow: hidden;
  transform-origin: center center;
  will-change: transform, opacity;
}

.img-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0);
  transition: background 0.3s ease;
}

.img-card:hover::after {
  background: rgba(0, 0, 0, 0.06);
}

.img-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: grayscale(15%) brightness(0.97);
  transition: filter 0.4s ease, transform 0.4s ease;
  pointer-events: none;
}

.img-card:hover img {
  filter: grayscale(0%) brightness(1);
  transform: scale(1.04);
}

/* Placeholder when image fails */
.img-card .placeholder {
  width: 100%;
  height: 100%;
  background: #0a0a0a;
  display: flex;
  align-items: center;
  justify-content: center;
}

.img-card .placeholder span {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: #333;
  text-transform: uppercase;
}

/* ── Lightbox ── */
#lightbox {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.97);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}

#lightbox.active {
  opacity: 1;
  pointer-events: all;
}

#lightbox-img-wrap {
  position: relative;
  max-width: 68vw;
  max-height: 68vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#lightbox-img {
  max-width: 68vw;
  max-height: 68vh;
  object-fit: contain;
  display: block;
  transform: scale(0.96);
  transition: transform 0.5s ease;
}

#lightbox.active #lightbox-img {
  transform: scale(1);
}

#lightbox-meta {
  margin-top: 36px;
  text-align: center;
}

#lightbox-title {
  font-size: 11px;
  letter-spacing: 0.5em;
  color: #000;
  text-transform: uppercase;
  font-weight: 400;
}

#lightbox-series {
  font-size: 9px;
  letter-spacing: 0.3em;
  color: #bbb;
  text-transform: uppercase;
  margin-top: 8px;
}

#lightbox-close {
  position: fixed;
  top: 40px;
  right: 48px;
  font-size: 9px;
  letter-spacing: 0.3em;
  color: #000;
  text-transform: uppercase;
  cursor: pointer;
  font-family: inherit;
  background: none;
  border: none;
  padding: 8px 0;
  transition: color 0.2s;
}

#lightbox-close:hover {
  color: #888;
}

#lightbox-nav {
  position: fixed;
  bottom: 40px;
  display: flex;
  gap: 32px;
}

#lightbox-prev, #lightbox-next {
  font-size: 9px;
  letter-spacing: 0.3em;
  color: #000;
  text-transform: uppercase;
  cursor: pointer;
  font-family: inherit;
  background: none;
  border: none;
  padding: 8px 0;
  transition: color 0.2s;
}

#lightbox-prev:hover, #lightbox-next:hover {
  color: #888;
}

/* ── Overlay canvas ── */
#overlay-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 5;
}

/* ── Drag cursor ── */
body.dragging {
  cursor: grabbing;
}
</style>
</head>
<body>

<div id="header">
  <div>
    <div id="site-title">Plastic World</div>
    <div id="site-sub">Photography Series</div>
  </div>
  <div id="hint">
    Drag to rotate<br>
    Click to view
  </div>
</div>

<canvas id="overlay-canvas"></canvas>

<div id="scene">
  <div id="sphere"></div>
</div>

<div id="lightbox">
  <button id="lightbox-close">Close</button>
  <div id="lightbox-img-wrap">
    <img id="lightbox-img" src="" alt="">
  </div>
  <div id="lightbox-meta">
    <div id="lightbox-title"></div>
    <div id="lightbox-series"></div>
  </div>
  <div id="lightbox-nav">
    <button id="lightbox-prev">← Prev</button>
    <button id="lightbox-next">Next →</button>
  </div>
</div>

<script>
// ── Image data ──────────────────────────────────────────
const IMAGES = [
  { src: 'Image/Cave 01.jpg',     title: 'Cave 01',     series: 'Cave' },
  { src: 'Image/Cave 02.jpg',     title: 'Cave 02',     series: 'Cave' },
  { src: 'Image/Mountain 01.jpg', title: 'Mountain 01', series: 'Mountain' },
  { src: 'Image/Mountain 02.jpg', title: 'Mountain 02', series: 'Mountain' },
  { src: 'Image/Mountain 03.jpg', title: 'Mountain 03', series: 'Mountain' },
  { src: 'Image/Sea 01.jpg',      title: 'Sea 01',      series: 'Sea' },
  { src: 'Image/Sea 02.jpg',      title: 'Sea 02',      series: 'Sea' },
  { src: 'Image/Sea 03.jpg',      title: 'Sea 03',      series: 'Sea' },
  { src: 'Image/Sea 04.jpg',      title: 'Sea 04',      series: 'Sea' },
  { src: 'Image/Seaweed 01.jpg',  title: 'Seaweed 01',  series: 'Seaweed' },
  { src: 'Image/Seaweed 02.jpg',  title: 'Seaweed 02',  series: 'Seaweed' },
  { src: 'Image/Wood 01.jpg',     title: 'Wood 01',     series: 'Wood' },
  { src: 'Image/Wood 02.jpg',     title: 'Wood 02',     series: 'Wood' },
  { src: 'Image/Wood 03.jpg',     title: 'Wood 03',     series: 'Wood' },
  { src: 'Image/Wood 04.jpg',     title: 'Wood 04',     series: 'Wood' },
];

// ── Config ──────────────────────────────────────────────
const RADIUS        = 178;    // sphere radius in px
const FOCAL         = 700;    // perspective focal length
const AUTO_SPEED    = 0.03;   // degrees per frame (auto rotation)
const DRAG_FACTOR   = 0.28;   // mouse drag sensitivity
const MAX_R_ADD     = 40;     // max extra radius on fast drag
const R_SMOOTH      = 0.08;   // radius lerp factor
const ROT_SMOOTH    = 0.88;   // momentum decay
const CARD_W        = 65;
const CARD_H        = 45;

// ── DOM refs ────────────────────────────────────────────
const sphere      = document.getElementById('sphere');
const scene       = document.getElementById('scene');
const lightbox    = document.getElementById('lightbox');
const lbImg       = document.getElementById('lightbox-img');
const lbTitle     = document.getElementById('lightbox-title');
const lbSeries    = document.getElementById('lightbox-series');
const lbClose     = document.getElementById('lightbox-close');
const lbPrev      = document.getElementById('lightbox-prev');
const lbNext      = document.getElementById('lightbox-next');

// ── State ────────────────────────────────────────────────
let angleX = -10, angleY = 0;  // degrees
let velX = 0, velY = 0;
let isDragging  = false;
let isHovering  = false;
let autoRotate  = true;
let lbIndex     = 0;
let currentR    = RADIUS;
let targetR     = RADIUS;
let zoomT       = 0;        // zoom progress 0=outside, 1=inside (700%)
let targetZoomT = 0;
let lastMouseX  = 0;
let lastMouseY  = 0;
let lastDX = 0, lastDY = 0;

// ── Fibonacci sphere base positions (unit sphere) ────────
const PHI = Math.PI * (3 - Math.sqrt(5));
const N   = IMAGES.length;

const basePoints = IMAGES.map((_, i) => {
  const y = 1 - (i / (N - 1)) * 2;
  const r = Math.sqrt(Math.max(0, 1 - y * y));
  const theta = PHI * i;
  return { x: Math.cos(theta) * r, y, z: Math.sin(theta) * r };
});

// ── Build card elements ──────────────────────────────────
const cards = IMAGES.map((imgData, i) => {
  const card = document.createElement('div');
  card.className = 'img-card';
  card.style.width  = CARD_W + 'px';
  card.style.height = CARD_H + 'px';

  const img = document.createElement('img');
  img.src = imgData.src;
  img.alt = imgData.title;

  img.onerror = () => {
    img.style.display = 'none';
    const ph = document.createElement('div');
    ph.className = 'placeholder';
    ph.innerHTML = `<span>${imgData.series}</span>`;
    card.appendChild(ph);
  };

  card.appendChild(img);
  card.addEventListener('mouseenter', () => { isHovering = true; });
  card.addEventListener('mouseleave', () => { isHovering = false; });
  card.addEventListener('click', () => {
    if (Math.abs(lastDX) > 4 || Math.abs(lastDY) > 4) return;
    openLightbox(i);
  });

  sphere.appendChild(card);
  return card;
});

// ── 3D rotation helper ───────────────────────────────────
function rotatePoint(p, axDeg, ayDeg) {
  const ax = axDeg * Math.PI / 180;
  const ay = ayDeg * Math.PI / 180;

  // Rotate around Y axis
  const cosY = Math.cos(ay), sinY = Math.sin(ay);
  const x1 =  p.x * cosY + p.z * sinY;
  const z1 = -p.x * sinY + p.z * cosY;
  const y1 =  p.y;

  // Rotate around X axis
  const cosX = Math.cos(ax), sinX = Math.sin(ax);
  const y2 = y1 * cosX - z1 * sinX;
  const z2 = y1 * sinX + z1 * cosX;

  return { x: x1, y: y2, z: z2 };
}

// ── Lightbox ─────────────────────────────────────────────
function openLightbox(index) {
  lbIndex = ((index % N) + N) % N;
  const d = IMAGES[lbIndex];
  lbImg.src   = d.src;
  lbImg.alt   = d.title;
  lbTitle.textContent  = d.title;
  lbSeries.textContent = d.series + ' Series — Plastic World';
  lightbox.classList.add('active');
  autoRotate = false;
}

function closeLightbox() {
  lightbox.classList.remove('active');
  autoRotate = true;
}

lbClose.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
lbPrev.addEventListener('click', () => openLightbox(lbIndex - 1));
lbNext.addEventListener('click', () => openLightbox(lbIndex + 1));

document.addEventListener('keydown', (e) => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'Escape')     closeLightbox();
  if (e.key === 'ArrowLeft')  openLightbox(lbIndex - 1);
  if (e.key === 'ArrowRight') openLightbox(lbIndex + 1);
});

// ── Mouse drag ───────────────────────────────────────────
scene.addEventListener('mousedown', (e) => {
  isDragging = true;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  lastDX = 0; lastDY = 0;
  velX = 0; velY = 0;
  document.body.classList.add('dragging');
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  lastDX = e.clientX - lastMouseX;
  lastDY = e.clientY - lastMouseY;
  velY += lastDX * DRAG_FACTOR;
  velX -= lastDY * DRAG_FACTOR;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  const speed = Math.sqrt(lastDX * lastDX + lastDY * lastDY);
  targetR = RADIUS + Math.min(speed * 1.5, MAX_R_ADD);
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  targetR = RADIUS;
  document.body.classList.remove('dragging');
  setTimeout(() => { if (!isDragging && !isHovering) autoRotate = true; }, 800);
});

// ── Mouse wheel zoom ──────────────────────────────────────
scene.addEventListener('wheel', (e) => {
  e.preventDefault();
  targetZoomT -= e.deltaY * 0.001;
  targetZoomT = Math.max(0, Math.min(1, targetZoomT));
}, { passive: false });

// ── Touch drag ───────────────────────────────────────────
let lastTX = 0, lastTY = 0;

scene.addEventListener('touchstart', (e) => {
  isDragging = true;
  lastTX = e.touches[0].clientX;
  lastTY = e.touches[0].clientY;
  velX = 0; velY = 0;
}, { passive: true });

window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - lastTX;
  const dy = e.touches[0].clientY - lastTY;
  velY += dx * DRAG_FACTOR;
  velX -= dy * DRAG_FACTOR;
  lastTX = e.touches[0].clientX;
  lastTY = e.touches[0].clientY;
  const speed = Math.sqrt(dx * dx + dy * dy);
  targetR = RADIUS + Math.min(speed * 1.5, MAX_R_ADD);
}, { passive: true });

window.addEventListener('touchend', () => {
  isDragging = false;
  targetR = RADIUS;
  setTimeout(() => { if (!isDragging) autoRotate = true; }, 800);
});

// ── Render loop ───────────────────────────────────────────
function tick() {
  if (autoRotate && !isDragging && !isHovering) {
    velY -= AUTO_SPEED;
  }

  angleY += velY;
  angleX += velX;
  velX *= ROT_SMOOTH;
  velY *= ROT_SMOOTH;
  angleX = Math.max(-85, Math.min(85, angleX));

  // Smooth drag radius and zoom
  currentR += (targetR - currentR) * R_SMOOTH;
  zoomT    += (targetZoomT - zoomT) * 0.06;

  // Sphere radius expands to 700% at full zoom
  const R_z = currentR * (1 + zoomT * 6);

  // Project all points: blend perspective (t=0) → orthographic (t=1)
  const projected = basePoints.map((p, i) => {
    const r = rotatePoint(p, angleX, angleY);

    // Perspective scale (camera fixed at FOCAL)
    const dz = FOCAL - r.z * R_z;
    const perspScale = dz > 0 ? FOCAL / dz : FOCAL / Math.abs(dz);

    // Blend: at t=1 all images same size (ortho scale = 1.0)
    const finalScale = perspScale * (1 - zoomT) + 1.0 * zoomT;

    const sx = r.x * R_z * finalScale;
    const sy = r.y * R_z * finalScale;
    return { i, sx, sy, z: r.z, scale: finalScale };
  });

  // Sort back-to-front
  projected.sort((a, b) => a.z - b.z);

  projected.forEach(({ i, sx, sy, z, scale }, order) => {
    const card = cards[i];
    card.style.display = '';
    // Blend depth-based opacity → uniform as zoom increases
    const depthOpacity = 0.3 + 0.7 * ((z + 1) / 2);
    const opacity = depthOpacity * (1 - zoomT) + 0.85 * zoomT;
    card.style.left      = sx + 'px';
    card.style.top       = sy + 'px';
    card.style.transform = `translate(-50%, -50%) scale(${scale})`;
    card.style.opacity   = opacity.toFixed(3);
    card.style.zIndex    = order;
  });

  // ── Draw overlay (axis, meridian, equator) ──────────────
  const canvas = document.getElementById('overlay-canvas');
  const ctx    = canvas.getContext('2d');
  if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  const cx = canvas.width  / 2;
  const cy = canvas.height / 2;

  function proj(nx, ny, nz) {
    const r  = rotatePoint({ x: nx, y: ny, z: nz }, angleX, angleY);
    const dz = FOCAL - r.z * R_z;
    const ps = dz > 0 ? FOCAL / dz : FOCAL / Math.abs(dz);
    const fs = ps * (1 - zoomT) + 1.0 * zoomT;
    return { x: cx + r.x * R_z * fs, y: cy + r.y * R_z * fs, z: r.z };
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#000';
  ctx.lineWidth   = 1;
  ctx.lineCap     = 'round';

  const STEPS = 72;

  // Rotation axis — solid, poles extended slightly beyond sphere
  ctx.setLineDash([]);
  const axisTop = proj(0,  1.35, 0);
  const axisBot = proj(0, -1.35, 0);
  ctx.beginPath();
  ctx.moveTo(axisTop.x, axisTop.y);
  ctx.lineTo(axisBot.x, axisBot.y);
  ctx.stroke();

  // Central meridian — dashed, great circle in YZ plane
  ctx.setLineDash([10, 10]);
  ctx.beginPath();
  for (let i = 0; i <= STEPS; i++) {
    const t = (i / STEPS) * Math.PI * 2;
    const p = proj(0, Math.cos(t), Math.sin(t));
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();

  // Equator — dashed, great circle in XZ plane
  ctx.beginPath();
  for (let i = 0; i <= STEPS; i++) {
    const t = (i / STEPS) * Math.PI * 2;
    const p = proj(Math.cos(t), 0, Math.sin(t));
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();

  ctx.setLineDash([]);

  requestAnimationFrame(tick);
}

tick();
</script>
</body>
</html>
